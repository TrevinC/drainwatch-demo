<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrainWatch - Climate-Resilient Stormwater Monitoring</title>

  <!-- CSP removed for GitHub Pages compatibility -->

  <!-- React + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- In-browser Babel (fine for demo; build for prod later) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CDN (fine for demo) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet for interactive OpenStreetMap -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="icon" href="./DrainWatch Logo 04.2026.png" type="image/png" />

  <style>
    @keyframes blink { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.3; } }
    .animate-blink { animation: blink 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Brand colors
    const BRAND_COLORS = {
      primary: '#005c89',
      dark: '#00264b',
      light: '#bbc9cd'
    };

    // Demo users/roles
    const USERS = {
      'Hult': { password: 'CRIO', role: 'dashboard', name: 'Hult' },
      'Wabash':   { password: 'IIT', role: 'wabash',    name: 'Wabash' }
    };

    // Icons
    const AlertTriangle = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );
    const TrendingUp = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <polyline strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} points="23 6 13.5 15.5 8.5 10.5 1 18" />
        <polyline strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} points="17 6 23 6 23 12" />
      </svg>
    );
    const LogOut = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
    );
    const Activity = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <polyline strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} points="22 12 18 12 15 21 9 3 6 12 2 12" />
      </svg>
    );
    const Battery = ({ className, level }) => {
      const fillWidth = Math.max(0, Math.min(100, level)) * 0.15; // 100% -> 15 units wide
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="2" y="7" width="18" height="10" rx="1" strokeWidth="2" />
          <rect x="3.5" y="8.5" width={fillWidth} height="7" fill="currentColor"
                className={level > 50 ? 'text-green-500' : level > 20 ? 'text-yellow-500' : 'text-red-500'} />
          <path d="M20 10h2v4h-2" strokeWidth="2" />
        </svg>
      );
    };

    // -----------------------
    // Demo data
    // -----------------------
    const sensorData = [
      { id: 'S-001', name: 'State & E 33rd St', status: 'normal', capacity: 52, flow: 27, headHeight: 2.1, lat: 41.8347, lng: -87.6270, battery: 88 },
      { id: 'S-002', name: 'Michigan & E 31st St', status: 'normal', capacity: 78, flow: 28, headHeight: 3.2, lat: 41.8384, lng: -87.6237, battery: 84 },
      { id: 'S-003', name: 'Federal & E 33rd St', status: 'normal', capacity: 45, flow: 22, headHeight: 1.8, lat: 41.8347, lng: -87.6293, battery: 85 },
      { id: 'S-004', name: 'Indiana & E 34th St', status: 'normal', capacity: 38, flow: 23, headHeight: 1.5, lat: 41.8329, lng: -87.6215, battery: 17 },
      { id: 'S-005', name: 'State & E 35th St', status: 'normal', capacity: 71, flow: 35, headHeight: 2.9, lat: 41.8311, lng: -87.6270, battery: 79 },
      { id: 'S-006', name: 'Michigan & E 32nd St', status: 'normal', capacity: 28, flow: 21, headHeight: 1.1, lat: 41.8366, lng: -87.6237, battery: 67 },
      { id: 'S-007', name: 'MLK & E 31st St', status: 'normal', capacity: 41, flow: 24, headHeight: 1.7, lat: 41.8384, lng: -87.6167, battery: 72 },
      { id: 'S-008', name: 'State & E 34th St', status: 'normal', capacity: 42, flow: 26, headHeight: 1.7, lat: 41.8329, lng: -87.6270, battery: 88 },
      { id: 'S-009', name: 'Federal & E 32nd St', status: 'normal', capacity: 35, flow: 23, headHeight: 1.4, lat: 41.8366, lng: -87.6293, battery: 73 },
      { id: 'S-010', name: 'Indiana & E 35th St', status: 'normal', capacity: 29, flow: 20, headHeight: 1.2, lat: 41.8311, lng: -87.6215, battery: 81 },
      { id: 'S-011', name: 'Michigan & E 34th St', status: 'normal', capacity: 33, flow: 25, headHeight: 1.3, lat: 41.8329, lng: -87.6237, battery: 56 },
      { id: 'S-012', name: 'State & E 31st St', status: 'normal', capacity: 40, flow: 27, headHeight: 1.6, lat: 41.8384, lng: -87.6270, battery: 94 },
      { id: 'S-013', name: 'Federal & E 34th St', status: 'normal', capacity: 36, flow: 22, headHeight: 1.5, lat: 41.8329, lng: -87.6293, battery: 89 },
      { id: 'S-014', name: 'MLK & E 33rd St', status: 'normal', capacity: 31, flow: 19, headHeight: 1.2, lat: 41.8347, lng: -87.6167, battery: 76 },
      { id: 'S-015', name: 'Michigan & E 35th St', status: 'normal', capacity: 44, flow: 29, headHeight: 1.8, lat: 41.8311, lng: -87.6237, battery: 15 },
      { id: 'S-016', name: 'Federal & E 31st St', status: 'normal', capacity: 37, flow: 21, headHeight: 1.5, lat: 41.8384, lng: -87.6293, battery: 83 },
    ];

    const workOrders = [
      { id: 'WO-2402', location: 'Near Michigan & 32nd',  risk: 'critical', issue: 'Partial blockage',        impact: 'High',   eta: '2 days', confidence: 91, lat: 41.8370, lng: -87.6232 },
      { id: 'WO-2403', location: 'Near Federal & 34th',   risk: 'high',     issue: 'Debris accumulation',     impact: 'Medium', eta: '3 days', confidence: 89, lat: 41.8333, lng: -87.6288 },
      { id: 'WO-2404', location: 'Near Indiana & 35th',   risk: 'high',     issue: 'Debris accumulation',     impact: 'High',   eta: '2 days', confidence: 87, lat: 41.8315, lng: -87.6210 },
      { id: 'WO-2405', location: 'Near State & 34th',     risk: 'medium',   issue: 'Reduced flow capacity',   impact: 'Low',    eta: '5 days', confidence: 78, lat: 41.8333, lng: -87.6265 },
    ];

    // Deployment boundary (Bronzeville pilot area: Federal to MLK, 31st to 35th)
    const deploymentBoundary = [
      [41.8392, -87.6302],
      [41.8392, -87.6158],
      [41.8303, -87.6158],
      [41.8303, -87.6302],
    ];

    const workingSensors = sensorData.filter(s => !s.error);
    const avgCapacity = Math.round(workingSensors.reduce((sum, s) => sum + s.capacity, 0) / workingSensors.length);
    // Rainfall leads capacity: rain peaked midday, system fill lags behind
    const historicalData = [
      { time: '00:00', capacity: Math.round(avgCapacity * 0.38), rain: 0.2 },
      { time: '04:00', capacity: Math.round(avgCapacity * 0.46), rain: 1.8 },
      { time: '08:00', capacity: Math.round(avgCapacity * 0.63), rain: 4.6 },
      { time: '12:00', capacity: Math.round(avgCapacity * 0.74), rain: 7.2 },
      { time: '16:00', capacity: Math.round(avgCapacity * 0.86), rain: 5.4 },
      { time: '20:00', capacity: Math.round(avgCapacity * 0.93), rain: 3.1 },
      { time: 'Now',   capacity: Math.round(avgCapacity),         rain: 1.6 },
    ];
    // -------- Simple SVG charts --------
    const SimpleLineChart = ({ data }) => {
      const maxValue = 100, minValue = 0;
      const padding = { top: 10, right: 5, bottom: 20, left: 12 };
      const chartWidth = 100 - padding.left - padding.right;
      const chartHeight = 100 - padding.top - padding.bottom;
      const getX = (i) => padding.left + (i / (data.length - 1)) * chartWidth;
      const getY = (v) => padding.top + (1 - (v - minValue) / (maxValue - minValue)) * chartHeight;
      const points = data.map((d, i) => `${getX(i)},${getY(d.capacity)}`).join(' ');
      const yAxisLabels = [0, 0.25, 0.5, 0.75, 1].map(pct => ({ value: `${Math.round(maxValue * pct)}%`, y: getY(maxValue * pct) }));
      return (
        <div className="relative h-72 bg-gray-50 rounded-lg p-4">
          <div className="text-sm font-semibold mb-2">System Capacity Trend</div>
          <svg className="w-full h-64" viewBox="0 0 100 100">
            {yAxisLabels.map((l, i) => (
              <g key={i}>
                <text x={padding.left - 2} y={l.y} fontSize="5" fill="#666" textAnchor="end" dominantBaseline="middle">{l.value}</text>
                <line x1={padding.left} y1={l.y} x2={padding.left + chartWidth} y2={l.y} stroke="#e5e7eb" strokeWidth="0.3" />
              </g>
            ))}
            {data.map((d, i) => (
              <text key={d.time} x={getX(i)} y={100 - padding.bottom + 7} fontSize="5" fill="#666" textAnchor="middle">{d.time}</text>
            ))}
            <line x1={padding.left} y1={getY(0)} x2={padding.left + chartWidth} y2={getY(0)} stroke="#666" strokeWidth="0.5" />
            <line x1={padding.left} y1={padding.top} x2={padding.left} y2={getY(0)} stroke="#666" strokeWidth="0.5" />
            <polyline points={points} fill="none" stroke="#ef4444" strokeWidth="1.5" />
            {data.map((d, i) => <circle key={i} cx={getX(i)} cy={getY(d.capacity)} r="1.5" fill="#ef4444" />)}
          </svg>
        </div>
      );
    };

    const RainfallChart = ({ data }) => {
      const maxValue = Math.max(...data.map(d => d.rain)) * 1.1;
      const padding = { top: 10, right: 5, bottom: 20, left: 12 };
      const chartWidth = 100 - padding.left - padding.right;
      const chartHeight = 100 - padding.top - padding.bottom;
      const barWidth = (chartWidth / data.length) * 0.8;
      const barSpacing = (chartWidth / data.length) * 0.2;
      const getY = (v) => padding.top + (1 - v / maxValue) * chartHeight;
      const yAxisLabels = [0, 0.25, 0.5, 0.75, 1].map(p => ({ value: Math.round(maxValue * p * 10) / 10, y: getY(maxValue * p) }));
      return (
        <div className="relative h-72 bg-gray-50 rounded-lg p-4">
          <div className="text-sm font-semibold mb-2">Rainfall Intensity (mm/hr) — Last 24 Hours</div>
          <svg className="w-full h-64" viewBox="0 0 100 100">
            {yAxisLabels.map((l, i) => (
              <g key={i}>
                <text x={padding.left - 2} y={l.y} fontSize="5" fill="#666" textAnchor="end" dominantBaseline="middle">{l.value}</text>
                <line x1={padding.left} y1={l.y} x2={padding.left + chartWidth} y2={l.y} stroke="#e5e7eb" strokeWidth="0.3" />
              </g>
            ))}
            {data.map((d, i) => {
              if (i % 2 !== 0) return null;
              const x = padding.left + i * (barWidth + barSpacing) + (barWidth / 2) + (barSpacing / 2);
              return <text key={d.time} x={x} y={100 - padding.bottom + 7} fontSize="5" fill="#666" textAnchor="middle">{d.time}</text>;
            })}
            <line x1={padding.left} y1={getY(0)} x2={padding.left + chartWidth} y2={getY(0)} stroke="#666" strokeWidth="0.5" />
            <line x1={padding.left} y1={padding.top} x2={padding.left} y2={getY(0)} stroke="#666" strokeWidth="0.5" />
            {data.map((d, i) => {
              const x = padding.left + i * (barWidth + barSpacing) + (barSpacing / 2);
              const y = getY(d.rain);
              const h = getY(0) - y;
              return <rect key={d.time} x={x} y={y} width={barWidth} height={h} className="fill-blue-500 transition-all hover:fill-blue-600">
                <title>{`${d.time}: ${d.rain} mm/hr`}</title>
              </rect>;
            })}
          </svg>
        </div>
      );
    };

    // -----------------------
    // Interactive OpenStreetMap (Leaflet)
    // -----------------------
    const DeploymentMap = ({ sensors, orders, onSelectSensor, onMapReady }) => {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      useEffect(() => {
        if (mapRef.current) return;
        const map = L.map(containerRef.current);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 20,
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        }).addTo(map);

        const boundary = L.polygon(deploymentBoundary, {
          color: BRAND_COLORS.primary, weight: 2.5, dashArray: '8 6',
          fillColor: BRAND_COLORS.primary, fillOpacity: 0.06,
        }).addTo(map).bindTooltip('DrainWatch Deployment Area', { sticky: true });

        const fitToDeployment = () => map.fitBounds(boundary.getBounds(), { padding: [30, 30] });
        fitToDeployment();
        // Container size isn't final at mount (dashboard renders right after login),
        // so re-measure and re-center once layout settles
        setTimeout(() => { map.invalidateSize(); fitToDeployment(); }, 150);

        sensors.forEach((s) => {
          const color = s.status === 'critical' ? '#ef4444' : s.status === 'warning' ? '#eab308' : '#22c55e';
          L.circleMarker([s.lat, s.lng], { radius: 7, color: '#ffffff', weight: 2.5, fillColor: color, fillOpacity: 1 })
            .addTo(map)
            .bindTooltip(`${s.id} — ${s.name}`)
            .on('click', () => {
              // Nudge the map so the anchored popup has room to render above the dot
              map.panInside([s.lat, s.lng], { paddingTopLeft: [200, 240], paddingBottomRight: [200, 60] });
              onSelectSensor(s);
            });
        });

        orders.forEach((o) => {
          const color = o.risk === 'critical' ? '#ef4444' : o.risk === 'high' ? '#f97316' : '#eab308';
          const icon = L.divIcon({
            className: '',
            html: `<svg class="animate-blink" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
          });
          L.marker([o.lat, o.lng], { icon }).addTo(map).bindTooltip(`${o.id} — ${o.issue}`);
        });

        mapRef.current = map;
        if (onMapReady) onMapReady(map);
        return () => { map.remove(); mapRef.current = null; };
      }, []);
      return <div ref={containerRef} className="w-full z-0" style={{ height: '100%', minHeight: '32rem' }} />;
    };

    // Deterministic per-sensor snapshot values (demo data derived from sensor id)
    const getSensorSnapshot = (sensor) => {
      const n = parseInt(sensor.id.slice(2), 10);
      return {
        lastMeasurement: `${(n % 4) + 1} min ago`,
        sensorTemp: (11 + (n % 5) * 0.7).toFixed(1),
        signal: ['Excellent', 'Good', 'Good', 'Fair'][n % 4],
        interval: '5 min',
        firmware: 'v2.4.1',
        lastMaintenance: 'Jun 12, 2026',
      };
    };

    // Deterministic hourly 7-day history per sensor: a daily cycle, two weather
    // fronts passing through the week, and per-sensor variation
    const getWeeklyTrend = (sensor) => {
      const n = parseInt(sensor.id.slice(2), 10);
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const points = [];
      for (let h = 0; h < 168; h++) {
        const day = Math.floor(h / 24);
        const hour = h % 24;
        const diurnal = 0.12 * Math.sin(((hour - 6) / 24) * 2 * Math.PI);
        const weather = 0.18 * Math.sin(((h + n * 13) / 168) * 4 * Math.PI);
        const noise = 0.03 * Math.sin(h * 0.45 + n * 5.1) + 0.02 * Math.sin(h * 0.19 + n * 2.3);
        const f = 1 + diurnal + weather + noise;
        points.push({
          label: `${dayNames[day]} ${String(hour).padStart(2, '0')}:00`,
          day: hour === 0 ? dayNames[day] : null,
          headHeight: +(sensor.headHeight * f).toFixed(2),
          flow: +(sensor.flow * f).toFixed(1),
          capacity: Math.min(100, Math.round(sensor.capacity * f)),
          sensorTemp: +(11 + (n % 5) * 0.7 + (f - 1) * 5 + 2.2 * Math.sin(((hour - 14) / 24) * 2 * Math.PI)).toFixed(1),
        });
      }
      return points;
    };

    const WeeklyTrendChart = ({ data, dataKey, label, unit }) => {
      const W = 600, H = 170;
      const padding = { top: 14, right: 14, bottom: 30, left: 44 };
      const chartWidth = W - padding.left - padding.right;
      const chartHeight = H - padding.top - padding.bottom;
      const maxValue = Math.max(...data.map(d => d[dataKey])) * 1.15;
      const getX = (i) => padding.left + (i / (data.length - 1)) * chartWidth;
      const getY = (v) => padding.top + (1 - v / maxValue) * chartHeight;
      const points = data.map((d, i) => `${getX(i)},${getY(d[dataKey])}`).join(' ');
      const yTicks = [0, 0.5, 1].map(p => ({ value: Math.round(maxValue * p * 10) / 10, y: getY(maxValue * p) }));
      const step = chartWidth / (data.length - 1);
      return (
        <div className="bg-gray-50 rounded-lg p-4">
          <div className="text-sm font-semibold mb-2">{label} <span className="font-normal text-gray-500">({unit})</span></div>
          <svg className="w-full h-auto" viewBox={`0 0 ${W} ${H}`}>
            {yTicks.map((t, i) => (
              <g key={i}>
                <text x={padding.left - 8} y={t.y} fontSize="12" fill="#6b7280" textAnchor="end" dominantBaseline="middle">{t.value}</text>
                <line x1={padding.left} y1={t.y} x2={padding.left + chartWidth} y2={t.y} stroke="#e5e7eb" strokeWidth="1" />
              </g>
            ))}
            {data.map((d, i) => d.day && (
              <g key={`d${i}`}>
                <line x1={getX(i)} y1={padding.top} x2={getX(i)} y2={H - padding.bottom} stroke="#e5e7eb" strokeWidth="1" />
                <text x={getX(i) + 4} y={H - padding.bottom + 20} fontSize="12" fill="#6b7280" textAnchor="start">{d.day}</text>
              </g>
            ))}
            <polyline points={points} fill="none" stroke={BRAND_COLORS.primary} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
            {data.map((d, i) => (
              <rect key={`h${i}`} x={getX(i) - step / 2} y={padding.top} width={step} height={chartHeight} fill="transparent">
                <title>{`${d.label}: ${d[dataKey]} ${unit}`}</title>
              </rect>
            ))}
          </svg>
        </div>
      );
    };

    // Popup card anchored above a sensor marker; follows the map as it pans/zooms
    const SensorPopup = ({ map, sensor, children }) => {
      const [pos, setPos] = useState(null);
      useEffect(() => {
        const update = () => setPos(map.latLngToContainerPoint([sensor.lat, sensor.lng]));
        update();
        map.on('move zoom', update);
        return () => map.off('move zoom', update);
      }, [map, sensor]);
      if (!pos) return null;
      return (
        <div className="absolute" style={{ left: pos.x, top: pos.y, transform: 'translate(-50%, calc(-100% - 16px))', zIndex: 1100, width: '21rem' }}>
          <div className="bg-white rounded-lg shadow-xl p-4 border-2" style={{ borderColor: BRAND_COLORS.primary }}>
            {children}
          </div>
          <div className="absolute left-1/2 w-3 h-3 bg-white border-b-2 border-r-2"
               style={{ bottom: '-7px', borderColor: BRAND_COLORS.primary, transform: 'translateX(-50%) rotate(45deg)' }} />
        </div>
      );
    };

    // -----------------------
    // Login
    // -----------------------
    const LoginPage = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [showCredentials, setShowCredentials] = useState(false);
      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        const user = USERS[username];
        if (user && user.password === password) onLogin({ username, ...user });
        else setError('Invalid username or password');
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{background: `linear-gradient(to bottom right, ${BRAND_COLORS.primary}, ${BRAND_COLORS.dark})`}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div className="text-center mb-8">
              <div className="flex items-center justify-center mb-4">
                <img src="./CRIO_Lockup Horizontal.png" alt="CRIO Systems Logo" style={{ height: '4.4rem' }} />
              </div>
              <div className="flex items-center justify-center mb-4">
                <img src="./DrainWatch Logo 04.2026.png" alt="DrainWatch Logo" className="h-16"
                     onError={(e)=>{ e.currentTarget.style.display='none'; e.currentTarget.nextSibling.style.display='block'; }} />
                <svg style={{display:'none'}} className="w-16 h-16" fill="none" stroke={BRAND_COLORS.primary} viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
                </svg>
              </div>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" value={username} onChange={(e)=>setUsername(e.target.value)}
                       className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-transparent"
                       placeholder="Enter username" required />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" value={password} onChange={(e)=>setPassword(e.target.value)}
                       className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-transparent"
                       placeholder="••••••••" required />

    // -----------------------
    // Flume landing (PURE SVG + Sheets API)
    // -----------------------
    const FlumeLanding = ({ user, onLogout }) => {
      const [error, setError] = useState(null);
      const [status, setStatus] = useState("Connecting...");
      const [timeSeriesData, setTimeSeriesData] = useState([]);
      const [spatialProfileData, setSpatialProfileData] = useState([]);
      const [spatialPoints, setSpatialPoints] = useState([]);

      const FLUME_CONFIG = {
        API_KEY: '--',
        SHEET1_ID: '1EdMfRA7FD7VKHPC-2YFzPbOIxMP292V5I14uG2NjlZo',
        SHEET1_TAB: 'Sewer Water Level Monitor',
        INSTALL_HEIGHT_CM_1: 55.0,
        S1_X_CM: 90.0,

        SHEET2_ID: '18SKMCgXKuoETTM2wjOr92JGJ1LPX8Izm8g1bAI627jA',
        SHEET2_TAB: 'Sewer Water Level Monitor - 2',
        INSTALL_HEIGHT_CM_2: 41.0,
        S2_X_CM: 259.0,

        FLUME_LENGTH_CM: 305.0,
        YMIN_CM: 0.0,
        YMAX_CM: 55.0,
        POLL_EVERY_SECONDS: 10,
        POINTS_TO_SHOW: 60
      };

      // Helper: parse Google serial or ISO string
      const parseSheetTime = (val) => {
        if (typeof val === 'number') {
          const base = new Date('1899-12-30T00:00:00Z').getTime();
          return new Date(base + val * 86400000);
        }
        const d = new Date(val);
        return isNaN(d) ? null : d;
      };

      // Fetch only needed columns and values
      const fetchSheetData = async (sheetId, tabName, installHeight) => {
        const range = encodeURIComponent(`${tabName}!A:B`); // A: timestamp, B: distance
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${FLUME_CONFIG.API_KEY}&fields=values&majorDimension=ROWS&valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING`;
        const res = await fetch(url, { credentials: 'omit' });
        if (!res.ok) {
          let msg = `Sheets API HTTP ${res.status}`;
          try { const j = await res.json(); if (j?.error?.message) msg = j.error.message; } catch {}
          if (/API key not valid/i.test(msg)) throw new Error("API key not valid, or Sheets API not enabled.");
          if (/PERMISSION_DENIED/i.test(msg)) throw new Error("Make each sheet 'Anyone with the link → Viewer'.");
          if (/Unable to parse range/i.test(msg)) throw new Error(`Tab name mismatch: "${tabName}"`);
          throw new Error(msg);
        }
        const json = await res.json();
        const rows = json.values || [];
        if (!rows.length) return [];
        const header = rows[0].map(h => String(h).toLowerCase());
        const tsCol  = header.indexOf("timestamp");
        const valCol = header.indexOf("distance to water (cm)");
        if (tsCol === -1 || valCol === -1) throw new Error(`Missing headers in "${tabName}": need "Timestamp" and "Distance to Water (cm)"`);
        const out = [];
        for (let i = 1; i < rows.length; i++) {
          const ts = parseSheetTime(rows[i][tsCol]);
          const dist = parseFloat(String(rows[i][valCol]).replace(",", ""));
          if (ts && !isNaN(dist)) {
            let h = installHeight - dist;
            h = Math.max(FLUME_CONFIG.YMIN_CM, Math.min(FLUME_CONFIG.YMAX_CM, h));
            out.push({ time: ts, height: h });
          }
        }
        // Keep only recent tail
        return out.slice(-FLUME_CONFIG.POINTS_TO_SHOW);
      };

      const refreshAllData = async () => {
        try {
          setError(null);
          setStatus("Fetching data...");

          const [d1, d2] = await Promise.all([
            fetchSheetData(FLUME_CONFIG.SHEET1_ID, FLUME_CONFIG.SHEET1_TAB, FLUME_CONFIG.INSTALL_HEIGHT_CM_1),
            fetchSheetData(FLUME_CONFIG.SHEET2_ID, FLUME_CONFIG.SHEET2_TAB, FLUME_CONFIG.INSTALL_HEIGHT_CM_2)
          ]);

          // Merge times for 2-line series
          const allTs = new Set([...d1.map(d => d.time.getTime()), ...d2.map(d => d.time.getTime())]);
          const merged = Array.from(allTs).sort((a,b)=>a-b).map(ts => ({
            name: new Date(ts).toLocaleTimeString(),
            time: new Date(ts),
            s1_height: d1.find(d => d.time.getTime() === ts)?.height ?? null,
            s2_height: d2.find(d => d.time.getTime() === ts)?.height ?? null
          }));
          setTimeSeriesData(merged);

          // Spatial profile
          const s1 = d1.length ? d1[d1.length-1].height : null;
          const s2 = d2.length ? d2[d2.length-1].height : null;
          const pts = [];
          if (s1 !== null) pts.push({ x: FLUME_CONFIG.S1_X_CM, z: s1 });
          if (s2 !== null) pts.push({ x: FLUME_CONFIG.S2_X_CM, z: s2 });
          setSpatialPoints(pts);

          let profile = [], slopeTxt = "—", headTxt = "—";
          if (pts.length === 2) {
            const [p1, p2] = pts[0].x <= pts[1].x ? [pts[0], pts[1]] : [pts[1], pts[0]];
            const m = (p2.z - p1.z) / (p2.x - p1.x);
            const b = p1.z - m * p1.x;
            profile = [
              { x: 0, z: Math.max(FLUME_CONFIG.YMIN_CM, m*0 + b) },
              { x: FLUME_CONFIG.FLUME_LENGTH_CM, z: Math.max(FLUME_CONFIG.YMIN_CM, m*FLUME_CONFIG.FLUME_LENGTH_CM + b) }
            ];
            const dx_m = (p2.x - p1.x) / 100.0;
            const dz_cm = p2.z - p1.z;
            slopeTxt = (dz_cm / dx_m).toFixed(2);
            headTxt = dz_cm.toFixed(2);
          } else if (pts.length === 1) {
            profile = [{ x: 0, z: pts[0].z }, { x: FLUME_CONFIG.FLUME_LENGTH_CM, z: pts[0].z }];
          }
          setSpatialProfileData(profile);

          const s1stat = s1 !== null ? `S1: ${s1.toFixed(1)} cm` : 'S1: no data';
          const s2stat = s2 !== null ? `S2: ${s2.toFixed(1)} cm` : 'S2: no data';
          setStatus(`Updated: ${new Date().toLocaleTimeString()} | ${s1stat} | ${s2stat} | Slope: ${slopeTxt} cm/m | ΔHead: ${headTxt} cm`);
        } catch (e) {
          console.error(e);
          setError(e.message);
          setStatus(`Error: ${e.message}. Retrying...`);
        }
      };

      useEffect(() => {
        refreshAllData();
        const id = setInterval(refreshAllData, FLUME_CONFIG.POLL_EVERY_SECONDS * 1000);
        return () => clearInterval(id);
      }, []);

      // Small SVG chart components with filled areas
      const MultiLineTimeSeries = ({ data, yMin, yMax, series }) => {
        const pad = { top: 30, right: 10, bottom: 22, left: 32 };
        const W = 800, H = 300;
        const innerW = W - pad.left - pad.right, innerH = H - pad.top - pad.bottom;
        const xs = (i) => pad.left + (data.length <= 1 ? 0 : (i / (data.length - 1)) * innerW);
        const ys = (v) => pad.top + (1 - (v - yMin) / (yMax - yMin)) * innerH;
        const yTicks = 5, yVals = Array.from({length: yTicks+1}, (_,i)=>yMin + i*(yMax-yMin)/yTicks);
        
        const buildSegments = (key) => {
          const segs=[], cur=[];
          data.forEach((d,i)=>{ const v=d[key];
            if (v==null) { if (cur.length){segs.push(cur.slice()); cur.length=0;} }
            else cur.push([xs(i), ys(v)]);
          });
          if (cur.length) segs.push(cur);
          return segs;
        };
        
        // Build filled area polygons
        const buildFilledAreas = (key, fillColor) => {
          const segs = buildSegments(key);
          const baselineY = ys(yMin);
          return segs.map((seg, j) => {
            if (seg.length < 2) return null;
            const points = [
              ...seg,
              [seg[seg.length - 1][0], baselineY],
              [seg[0][0], baselineY]
            ];
            return (
              <polygon
                key={j}
                points={points.map(([x,y]) => `${x},${y}`).join(' ')}
                fill={fillColor}
                opacity="0.3"
              />
            );
          });
        };
        
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-72">
            {yVals.map((yv,i)=>{const y=ys(yv); return (
              <g key={i}>
                <line x1={pad.left} y1={y} x2={pad.left+innerW} y2={y} stroke="#e5e7eb" />
                <text x={pad.left-6} y={y} fontSize="10" fill="#555" textAnchor="end" dominantBaseline="middle">{Math.round(yv)}</text>
              </g>
            );})}
            <line x1={pad.left} y1={pad.top} x2={pad.left} y2={pad.top+innerH} stroke="#666" />
            <line x1={pad.left} y1={pad.top+innerH} x2={pad.left+innerW} y2={pad.top+innerH} stroke="#666" />
            {data.map((d,i)=>{ const show = data.length<=10 || i%Math.ceil(data.length/10)===0;
              return show ? <text key={i} x={xs(i)} y={pad.top+innerH+14} fontSize="10" fill="#555" textAnchor="middle">{d.name}</text> : null;
            })}
            
            {series.map(({key,color,label})=>(
              <g key={key}>
                {buildFilledAreas(key, color)}
                {buildSegments(key).map((seg,j)=>
                  <polyline key={j} points={seg.map(([x,y])=>`${x},${y}`).join(' ')} fill="none" stroke={color} strokeWidth="2" />
                )}
                {data.map((d,i)=> d[key]==null?null:<circle key={i} cx={xs(i)} cy={ys(d[key])} r="2.5" fill={color}><title>{`${label} @ ${d.name}: ${d[key].toFixed(1)} cm`}</title></circle>)}
              </g>
            ))}
            
            <g>
              {series.map(({label,color},idx)=>(
                <g key={label} transform={`translate(${pad.left + idx*140}, ${pad.top})`}>
                  <rect x="0" y="-8" width="12" height="4" fill={color} />
                  <text x="18" y="-6" fontSize="12" fill="#333">{label}</text>
                </g>
              ))}
            </g>
            <text x="10" y={H/2} fontSize="12" fill="#333" transform={`rotate(-90 10 ${H/2})`} textAnchor="middle">Water Height (cm)</text>
          </svg>
        );
      };

      const SpatialProfileChart = ({ profile, points, yMin, yMax, xMax }) => {
        const pad = { top: 30, right: 10, bottom: 28, left: 40 };
        const W = 800, H = 280;
        const innerW = W - pad.left - pad.right, innerH = H - pad.top - pad.bottom;
        const xs = (x) => pad.left + (x / xMax) * innerW;
        const ys = (z) => pad.top + (1 - (z - yMin) / (yMax - yMin)) * innerH;
        const yTicks = 5, yVals = Array.from({length:yTicks+1},(_,i)=>yMin + i*(yMax-yMin)/yTicks);
        const xTicks = 6, xVals = Array.from({length:xTicks+1},(_,i)=>Math.round(i*xMax/xTicks));
        
        const baselineY = ys(yMin);
        const fillPoints = profile.length >= 2 ? [
          ...profile.map(p => [xs(p.x), ys(p.z)]),
          [xs(profile[profile.length - 1].x), baselineY],
          [xs(profile[0].x), baselineY]
        ] : [];
        
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-80">
            {yVals.map((yv,i)=>{const y=ys(yv); return <line key={'y'+i} x1={pad.left} y1={y} x2={pad.left+innerW} y2={y} stroke="#e5e7eb" />;})}
            {xVals.map((xv,i)=>{const x=xs(xv); return <line key={'x'+i} x1={x} y1={pad.top} x2={x} y2={pad.top+innerH} stroke="#f0f0f0" />;})}
            <line x1={pad.left} y1={pad.top} x2={pad.left} y2={pad.top+innerH} stroke="#666" />
            <line x1={pad.left} y1={pad.top+innerH} x2={pad.left+innerW} y2={pad.top+innerH} stroke="#666" />
            {yVals.map((yv,i)=>
              <text key={i} x={pad.left-6} y={ys(yv)} fontSize="10" fill="#555" textAnchor="end" dominantBaseline="middle">{Math.round(yv)}</text>
            )}
            {xVals.map((xv,i)=>
              <text key={i} x={xs(xv)} y={pad.top+innerH+16} fontSize="10" fill="#555" textAnchor="middle">{xv}</text>
            )}
            
            {fillPoints.length > 0 && (
              <polygon 
                points={fillPoints.map(([x,y]) => `${x},${y}`).join(' ')} 
                fill="#3b82f6" 
                opacity="0.3" 
              />
            )}
            
            {profile.length>=2 && <polyline points={profile.map(p=>`${xs(p.x)},${ys(p.z)}`).join(' ')} fill="none" stroke="#3b82f6" strokeWidth="2" />}
            
            {points.map((p,i)=><circle key={i} cx={xs(p.x)} cy={ys(p.z)} r="4" fill="#ef4444"><title>{`Sensor @ ${Math.round(p.x)} cm: ${p.z.toFixed(1)} cm`}</title></circle>)}
            
            <text x="10" y={H/2} fontSize="12" fill="#333" transform={`rotate(-90 10 ${H/2})`} textAnchor="middle">Water Height (cm)</text>
            <text x={pad.left + innerW/2} y={pad.top+innerH+24} fontSize="12" fill="#333" textAnchor="middle">Position along flume (cm)</text>
          </svg>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50">
          <DashboardHeader user={user} onLogout={onLogout} />
          <main className="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
            <div className="bg-white rounded-lg shadow-lg p-8">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-3xl font-bold text-gray-800">Live Flume Lab Monitor</h2>
                <Activity className="w-10 h-10" style={{ color: BRAND_COLORS.primary }} />
              </div>
              <div className="text-sm text-gray-600 mb-6 p-4 rounded-lg"
                   style={{ backgroundColor: error ? '#fff0f0' : BRAND_COLORS.light, color: error ? 'red' : BRAND_COLORS.dark }}>
                {status}
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div>
                  <h3 className="text-xl font-semibold mb-4" style={{ color: BRAND_COLORS.dark }}>Site 1 Water Level</h3>
                  <MultiLineTimeSeries
                    data={timeSeriesData}
                    yMin={FLUME_CONFIG.YMIN_CM}
                    yMax={FLUME_CONFIG.YMAX_CM}
                    series={[
                      { key: 's1_height', color: '#3b82f6', label: 'Site 1 (cm)' }
                    ]}
                  />
                </div>
                
                <div>
                  <h3 className="text-xl font-semibold mb-4" style={{ color: BRAND_COLORS.dark }}>Site 2 Water Level</h3>
                  <MultiLineTimeSeries
                    data={timeSeriesData}
                    yMin={FLUME_CONFIG.YMIN_CM}
                    yMax={FLUME_CONFIG.YMAX_CM}
                    series={[
                      { key: 's2_height', color: '#10b981', label: 'Site 2 (cm)' }
                    ]}
                  />
                </div>
              </div>
              
              <div>
                <h3 className="text-xl font-semibold mb-4" style={{ color: BRAND_COLORS.dark }}>Spatial Profile</h3>
                <SpatialProfileChart
                  profile={spatialProfileData}
                  points={spatialPoints}
                  yMin={FLUME_CONFIG.YMIN_CM}
                  yMax={FLUME_CONFIG.YMAX_CM}
                  xMax={FLUME_CONFIG.FLUME_LENGTH_CM}
                />
              </div>
            </div>
          </main>
        </div>
      );
    };

    // -----------------------
    // Wabash placeholder
    // -----------------------
    const WabashLanding = ({ user, onLogout }) => (
      <div className="min-h-screen bg-gray-50">
        <DashboardHeader user={user} onLogout={onLogout} />
        <main className="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
          <div className="bg-white rounded-lg shadow-lg p-12 text-center">
            <Activity className="w-24 h-24 mx-auto mb-6" style={{color: BRAND_COLORS.primary}} />
            <h2 className="text-3xl font-bold text-gray-800 mb-4">Wabash Sensor Pair</h2>
            <p className="text-xl text-gray-600 mb-8">Live sensor monitoring coming soon</p>
            <div className="max-w-2xl mx-auto text-left rounded-lg p-6" style={{backgroundColor: BRAND_COLORS.light}}>
              <h3 className="font-bold text-lg mb-3" style={{color: BRAND_COLORS.dark}}>Planned Features:</h3>
              <ul className="space-y-2 text-gray-700">
                <li className="flex items-start"><span className="mr-2" style={{color: BRAND_COLORS.primary}}>•</span>Real-time data from sensor pair</li>
                <li className="flex items-start"><span className="mr-2" style={{color: BRAND_COLORS.primary}}>•</span>Live plotting capabilities</li>
                <li className="flex items-start"><span className="mr-2" style={{color: BRAND_COLORS.primary}}>•</span>Data logging and export</li>
                <li className="flex items-start"><span className="mr-2" style={{color: BRAND_COLORS.primary}}>•</span>Performance analytics</li>
              </ul>
            </div>
          </div>
        </main>
      </div>
    );

    // -----------------------
    // App
    // -----------------------
    const App = () => {
      const [user, setUser] = useState(null);
      useEffect(() => {
        const saved = localStorage.getItem('drainwatch_user');
        if (saved) setUser(JSON.parse(saved));
      }, []);
      const handleLogin = (ud) => { setUser(ud); localStorage.setItem('drainwatch_user', JSON.stringify(ud)); };
      const handleLogout = () => { setUser(null); localStorage.removeItem('drainwatch_user'); };
      if (!user) return <LoginPage onLogin={handleLogin} />;
      switch (user.role) {
        case 'dashboard': return <GraingerDashboard user={user} onLogout={handleLogout} />;
        case 'flume':     return <FlumeLanding     user={user} onLogout={handleLogout} />;
        case 'wabash':    return <WabashLanding    user={user} onLogout={handleLogout} />;
        default:          return <LoginPage onLogin={handleLogin} />;
      }
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
